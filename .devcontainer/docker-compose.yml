services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ~/.gitconfig:/root/.gitconfig
      - ~/.ssh:/root/.ssh:ro
    ports:
      - "8080:8080"
      - "9990:9990"
      - "4200:4200"
    depends_on:
      - db
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: symphony
      POSTGRES_USER: symphony
      POSTGRES_PASSWORD: symphony
    ports:
      - "5432:5432"
