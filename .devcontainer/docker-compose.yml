version: "3"
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached,consistency=cached
      - ~/.gitconfig:/root/.gitconfig
    ports:
      - "4200:4200"
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: symphony
      POSTGRES_USER: symphony
      POSTGRES_PASSWORD: symphony
    ports:
      - "5432:5432"
