name: Test

on:
  push:
    branches: [main, develop, hachathon-1]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f .devcontainer/docker-compose.yml up -d

      - name: Wait for services to be ready
        run: |
          sleep 10

      - name: Start Wildfly
        run: |
          docker compose -f .devcontainer/docker-compose.yml exec -T dev start-wildfly.sh
          sleep 10

      - name: Deploy backend
        run: |
          docker compose -f .devcontainer/docker-compose.yml exec -T dev deploy-backend.sh
          sleep 5

      - name: Run backend tests
        run: |
          docker compose -f .devcontainer/docker-compose.yml exec -T dev pwd
          docker compose -f .devcontainer/docker-compose.yml exec -T dev ls -la
          docker compose -f .devcontainer/docker-compose.yml exec -T dev bash -c "cd workspace/symphony-ws && mvn test"

      - name: Stop services
        run: |
          docker compose -f .devcontainer/docker-compose.yml down
        if: always()
